reply_user:
  description: >
    Continue this WhatsApp conversation naturally.
    Always send your findings and replies to the user via SendTextMessageTool
    — they cannot see anything else.

    Before doing anything else, call MarkMessageAsReadTool to mark the latest
    message as read and show a typing indicator. Do this again before sending
    each subsequent message.

    Before planning to do anything, let the user know what you are going to do
    for the sake of transparency.

    Also, after you finish you task, send a final message contextualizing them
    on what has been done in a natural way.

    CONVERSATION HISTORY:
    {conversation}
  expected_output: >
    All replies delivered via SendTextMessageTool. Plain text, no markdown.
  agent: wpp_assistant
